<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Inventory Security Engine</title>

<link rel="stylesheet" href="css/auth.css">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="wrapper">

  <div class="left-panel">
    <div class="overlay">
      <h1>Inventory Security Engine</h1>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <img src="css/logo.png" alt="Logo" class="auth-logo">
      
      <h2>Sign up to ISE</h2>

      <form id="signupForm">
        <input type="text" id="signupFullName" placeholder="Full Name" required>
        <input type="text" id="signupUsername" placeholder="Username" required>
        <input type="email" id="signupEmail" placeholder="Email Address" required>
        <input type="text" id="signupPhone" placeholder="Phone Number" required>
        
        <input type="password" id="signupPassword" placeholder="Password" required>
        <div id="passwordStrength" class="strength-meter"></div>
        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>

        <div class="checkbox-container">
          <input type="checkbox" id="termsCheckbox" required>
          <label for="termsCheckbox">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        
        <div class="captcha-box">
          <label class="captcha-label">Captcha</label>
          <div class="captcha-row">
            <canvas id="captchaCanvas" width="160" height="48"></canvas>
            <button type="button" id="refreshCaptcha" title="Refresh CAPTCHA">&#x21bb;</button>
          </div>
          <input type="text" id="captchaInput" placeholder="Enter characters above"
                 autocomplete="off" maxlength="6" required>
          <span id="captchaError" class="captcha-error"></span>
        </div>

        <button type="submit">Create Account</button>
      </form>

      <p class="switch">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
