<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="css/auth.css">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="wrapper">

  <div class="left-panel">
    <div class="overlay">
      <h1>Inventory Security Engine</h1>
      <p>Secure password recovery for your account.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <h2>Reset Your Password</h2>
      <p>Enter your username to receive a reset code</p>

      <div id="requestTokenSection">
        <form id="requestTokenForm">
          <input type="text" id="username" placeholder="Username" required>
          <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
          <button type="submit">Send Reset Code</button>
        </form>
      </div>

      <div id="resetPasswordSection" style="display: none;">
        <p>Enter the reset code and your new password</p>
        <form id="resetPasswordForm">
          <input type="text" id="resetUsername" placeholder="Username" readonly>
          <input type="text" id="resetToken" placeholder="Reset Code" required>
          <input type="password" id="newPassword" placeholder="New Password" required>
          <div id="passwordStrength" class="strength-meter"></div>
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
          <button type="submit">Reset Password</button>
        </form>
      </div>

      <p class="switch">
        Remember your password? <a href="login.html">Back to Login</a>
      </p>
    </div>
  </div>

</div>

<script src="js/forgot-password.js"></script>
</body>
</html>
